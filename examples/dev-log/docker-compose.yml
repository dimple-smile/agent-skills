# Dev-log 多语言测试
#
# 使用方式：
# 1. 先启动 dev-log 服务: cd ../../skills/dev-log && node dist/index.cjs
# 2. 查看服务输出的端口号，设置为环境变量:
#    export DEV_LOG_PORT=54321
# 3. 运行所有测试: docker compose up --build
# 4. 运行单个测试: docker compose up --build python

services:
  # JavaScript (Node.js)
  javascript:
    image: node:20-alpine
    volumes:
      - ./src:/src
    working_dir: /src
    command: node test.js
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # TypeScript (Node.js + tsx)
  typescript:
    image: node:20-alpine
    volumes:
      - ./src:/src
    working_dir: /src
    command: sh -c "npm install -g tsx && tsx test.ts"
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Python
  python:
    image: python:3.12-slim
    volumes:
      - ./src:/src
    working_dir: /src
    command: python test.py
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Go
  go:
    image: golang:1.22-alpine
    volumes:
      - ./src:/src
    working_dir: /src
    command: go run test.go
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Rust
  rust:
    image: rust:1.75-slim
    volumes:
      - ./src:/src
    working_dir: /src
    command: sh -c "cd /tmp && cargo init --name devlog && cp /src/test.rs src/main.rs && echo 'reqwest = { version = \"0.11\", features = [\"blocking\", \"json\"] }' >> Cargo.toml && echo 'serde_json = \"1.0\"' >> Cargo.toml && cargo run"
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Java
  java:
    image: eclipse-temurin:21-jdk
    volumes:
      - ./src:/src
    working_dir: /src
    command: sh -c "javac Test.java && java Test"
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # C++
  cpp:
    image: gcc:13
    volumes:
      - ./src:/src
    working_dir: /src
    command: sh -c "apt-get update && apt-get install -y libcurl4-openssl-dev && g++ -std=c++17 -o test test.cpp -lcurl && ./test"
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # C#
  csharp:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    volumes:
      - ./src:/src
    working_dir: /src
    command: sh -c "mkdir -p /tmp/csharp && cd /tmp/csharp && dotnet new console --force && cp /src/Test.cs Program.cs && dotnet run"
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # PHP
  php:
    image: php:8.2-cli
    volumes:
      - ./src:/src
    working_dir: /src
    command: php test.php
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Ruby
  ruby:
    image: ruby:3.3-alpine
    volumes:
      - ./src:/src
    working_dir: /src
    command: ruby test.rb
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Kotlin
  kotlin:
    image: zenika/kotlin:jdk21
    volumes:
      - ./src:/src
    working_dir: /src
    command: sh -c "kotlinc Test.kt -include-runtime -d test.jar && java -jar test.jar"
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Swift
  swift:
    image: swift:5.9
    volumes:
      - ./src:/src
    working_dir: /src
    command: swift test.swift
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Dart
  dart:
    image: dart:stable
    volumes:
      - ./src:/src
    working_dir: /src
    command: dart run test.dart
    environment:
      - PORT=${DEV_LOG_PORT:-3000}
      - HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
